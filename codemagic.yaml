          mkdir -p /tmp/ipa_inspect
          unzip -q -o "${IPA}" -d /tmp/ipa_inspect
          APP="$(find /tmp/ipa_inspect/Payload -maxdepth 1 -name '*.app' -type d | head -n 1)"
          PLIST="${APP}/Info.plist"
          BID="$(/usr/libexec/PlistBuddy -c 'Print :CFBundleIdentifier' "${PLIST}")"
          VER="$(/usr/libexec/PlistBuddy -c 'Print :CFBundleShortVersionString' "${PLIST}")"
          BN="$(/usr/libexec/PlistBuddy -c 'Print :CFBundleVersion' "${PLIST}")"
          DISPLAY="$(/usr/libexec/PlistBuddy -c 'Print :CFBundleDisplayName' "${PLIST}" 2>/dev/null || true)"
          echo "CFBundleIdentifier=${BID}"
          echo "CFBundleShortVersionString=${VER}"
          echo "CFBundleVersion=${BN}"
          echo "CFBundleDisplayName=${DISPLAY}"
          if [ "${BID}" != "com.mkgenterprises.mkgTaxMobile" ]; then
            echo "Bundle ID mismatch: got ${BID}" >&2
            exit 1
          fi
          test "${BID}" = "${BUNDLE_ID}"
          codesign -dvvv "${APP}" 2>&1 | tee /tmp/codesign.txt | grep -E 'Authority=|TeamIdentifier=|Identifier=' || true
          if ! grep -q 'Authority=Apple Distribution' /tmp/codesign.txt; then
            echo "Expected Apple Distribution signing identity" >&2
            exit 1
          fi
          if grep -qE 'Authority=Apple Development|Authority=iPhone Developer' /tmp/codesign.txt; then
            echo "Development signing identity is not allowed for this release IPA" >&2
