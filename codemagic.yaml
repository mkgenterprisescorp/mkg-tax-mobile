# Codemagic iOS release — MKG Tax Consultants Pro Filer
# Repo: mkgenterprisescorp/mkg-tax-mobile
# Bundle ID (permanent): com.mkgenterprises.mkgTaxMobile
# Production API: https://app.mkgtaxconsultants.com/api/v1
#
# Workflows:
#   ios_signed_prepare  — signed IPA + artifacts only (NO App Store Connect upload)
#   ios_testflight      — signed IPA + TestFlight upload only (NO App Store submit)
#
# Prerequisites (Codemagic Team / app settings — not stored in git):
#   1. Developer Portal integration key name must match `integrations.app_store_connect`
#      below (same key that signed Codemagic build 6a620ddaf44974f6fb95f192).
#   2. Encrypted group `ios_appstore` must define numeric APP_STORE_APPLE_ID
#      (App Store Connect Apple ID for this app record — not the bundle ID).
#   3. Start builds manually (UI or REST API). Do not push release tags.
#
# Guardrails: never submit_to_app_store. Do not change the bundle ID.

workflows:
  ios_signed_prepare:
    name: iOS signed prepare (no upload)
    instance_type: mac_mini_m2
    max_build_duration: 120
    # Manual / API only — no git tag or push triggers.
    triggering:
      events: []
    integrations:
      # Rename to match Team integrations → Developer Portal key label exactly.
      app_store_connect: App Store Connect
    environment:
      groups:
        - ios_appstore
      flutter: "3.44.6"
      xcode: "16.4"
      cocoapods: default
      ios_signing:
        distribution_type: app_store
        bundle_identifier: com.mkgenterprises.mkgTaxMobile
      vars:
        APP_ENV: production
        API_BASE_URL: https://app.mkgtaxconsultants.com/api/v1
        BUNDLE_ID: com.mkgenterprises.mkgTaxMobile
        # Floor when TestFlight has no prior build (first successful signed IPA used 32).
        IOS_BUILD_NUMBER_FLOOR: "33"
    scripts:
      - name: Get Flutter packages
        script: |
          flutter pub get
      - name: Flutter analyze
        script: |
          flutter analyze --no-fatal-infos
      - name: Flutter tests
        script: |
          flutter test --concurrency=1
      - name: Set up code signing (App Store distribution)
        script: |
          xcode-project use-profiles
      - name: Resolve next iOS build number
        script: |
          set -euo pipefail
          if [ -z "${APP_STORE_APPLE_ID:-}" ]; then
            echo "APP_STORE_APPLE_ID missing from encrypted group ios_appstore" >&2
            exit 1
          fi
          # Prefer TestFlight latest; fall back to App Store; then floor.
          LATEST="$(app-store-connect get-latest-testflight-build-number "$APP_STORE_APPLE_ID" 2>/dev/null || true)"
          if [ -z "${LATEST}" ] || ! [[ "${LATEST}" =~ ^[0-9]+$ ]]; then
            LATEST="$(app-store-connect get-latest-app-store-build-number "$APP_STORE_APPLE_ID" 2>/dev/null || true)"
          fi
          if [ -z "${LATEST}" ] || ! [[ "${LATEST}" =~ ^[0-9]+$ ]]; then
            LATEST=0
          fi
          CANDIDATE=$((LATEST + 1))
          FLOOR="${IOS_BUILD_NUMBER_FLOOR}"
          if [ "${CANDIDATE}" -lt "${FLOOR}" ]; then
            BUILD_NUMBER="${FLOOR}"
          else
            BUILD_NUMBER="${CANDIDATE}"
          fi
          echo "Resolved BUILD_NUMBER=${BUILD_NUMBER} (latest=${LATEST}, floor=${FLOOR})"
          echo "BUILD_NUMBER=${BUILD_NUMBER}" >> "$CM_ENV"
      - name: Build signed IPA (production API)
        script: |
          set -euo pipefail
          flutter build ipa --release \
            --build-number="$BUILD_NUMBER" \
            --dart-define=APP_ENV=production \
            --dart-define=API_BASE_URL=https://app.mkgtaxconsultants.com/api/v1 \
            --export-options-plist=/Users/builder/export_options.plist
      - name: Inspect IPA (bundle ID + distribution profile)
        script: |
          set -euo pipefail
          IPA="$(find build/ios/ipa -name '*.ipa' | head -n 1)"
          if [ -z "${IPA}" ]; then
            echo "No IPA produced under build/ios/ipa" >&2
            exit 1
          fi
          echo "IPA=${IPA}"
          shasum -a 256 "${IPA}" | tee /tmp/ipa.sha256
          mkdir -p /tmp/ipa_inspect
          unzip -q -o "${IPA}" -d /tmp/ipa_inspect
          APP="$(find /tmp/ipa_inspect/Payload -maxdepth 1 -name '*.app' -type d | head -n 1)"
          PLIST="${APP}/Info.plist"
          BID="$(/usr/libexec/PlistBuddy -c 'Print :CFBundleIdentifier' "${PLIST}")"
          VER="$(/usr/libexec/PlistBuddy -c 'Print :CFBundleShortVersionString' "${PLIST}")"
          BN="$(/usr/libexec/PlistBuddy -c 'Print :CFBundleVersion' "${PLIST}")"
          echo "CFBundleIdentifier=${BID}"
          echo "CFBundleShortVersionString=${VER}"
          echo "CFBundleVersion=${BN}"
          test "${BID}" = "${BUNDLE_ID}"
          codesign -dvvv "${APP}" 2>&1 | tee /tmp/codesign.txt | grep -E 'Authority=|TeamIdentifier=|Identifier=' || true
          if ! grep -q 'Authority=Apple Distribution' /tmp/codesign.txt; then
            echo "Expected Apple Distribution signing identity" >&2
            exit 1
          fi
          if grep -qE 'Authority=Apple Development|Authority=iPhone Developer' /tmp/codesign.txt; then
            echo "Development signing identity is not allowed for this release IPA" >&2
            exit 1
          fi
          PROFILE="${APP}/embedded.mobileprovision"
          test -f "${PROFILE}"
          security cms -D -i "${PROFILE}" > /tmp/profile.plist
          /usr/libexec/PlistBuddy -c 'Print :Name' /tmp/profile.plist | sed 's/^/ProfileName=/'
          /usr/libexec/PlistBuddy -c 'Print :Entitlements:get-task-allow' /tmp/profile.plist 2>/dev/null \
            | sed 's/^/get-task-allow=/' || true
          # App Store / TestFlight profiles must not allow debugging.
          if /usr/libexec/PlistBuddy -c 'Print :Entitlements:get-task-allow' /tmp/profile.plist 2>/dev/null | grep -qi true; then
            echo "embedded.mobileprovision looks like development (get-task-allow=true)" >&2
            exit 1
          fi
          # Secret / misconfig scan (binary-safe).
          if rg -a -n -e 'neon\.tech|DATABASE_URL|HMAC_SECRET|identity_assertion_secret|MOCK_PASSWORD|/internal/mobile|localhost|127\.0\.0\.1|http://app\.mkgtaxconsultants\.com|sk_live_|BEGIN (RSA |EC |OPENSSH )?PRIVATE KEY' "${APP}"; then
            echo "Forbidden pattern found inside IPA payload" >&2
            exit 1
          fi
          echo "IPA inspection passed (no App Store Connect upload in this workflow)."
    artifacts:
      - build/ios/ipa/*.ipa
      - /tmp/xcodebuild_logs/*.log
      - /tmp/ipa.sha256
      - /tmp/codesign.txt
    # Intentionally no app_store_connect publishing — upload requires explicit
    # approval, then start workflow ios_testflight.

  ios_testflight:
    name: iOS TestFlight upload (approval required)
    instance_type: mac_mini_m2
    max_build_duration: 120
    triggering:
      events: []
    integrations:
      app_store_connect: App Store Connect
    environment:
      groups:
        - ios_appstore
      flutter: "3.44.6"
      xcode: "16.4"
      cocoapods: default
      ios_signing:
        distribution_type: app_store
        bundle_identifier: com.mkgenterprises.mkgTaxMobile
      vars:
        APP_ENV: production
        API_BASE_URL: https://app.mkgtaxconsultants.com/api/v1
        BUNDLE_ID: com.mkgenterprises.mkgTaxMobile
        IOS_BUILD_NUMBER_FLOOR: "33"
    scripts:
      - name: Get Flutter packages
        script: |
          flutter pub get
      - name: Flutter analyze
        script: |
          flutter analyze --no-fatal-infos
      - name: Flutter tests
        script: |
          flutter test --concurrency=1
      - name: Set up code signing (App Store / TestFlight Internal Only)
        script: |
          # Internal TestFlight only — not eligible for external beta or App Store.
          xcode-project use-profiles \
            --custom-export-options='{"testFlightInternalTestingOnly": true}'
      - name: Resolve next iOS build number
        script: |
          set -euo pipefail
          if [ -z "${APP_STORE_APPLE_ID:-}" ]; then
            echo "APP_STORE_APPLE_ID missing from encrypted group ios_appstore" >&2
            exit 1
          fi
          LATEST="$(app-store-connect get-latest-testflight-build-number "$APP_STORE_APPLE_ID" 2>/dev/null || true)"
          if [ -z "${LATEST}" ] || ! [[ "${LATEST}" =~ ^[0-9]+$ ]]; then
            LATEST="$(app-store-connect get-latest-app-store-build-number "$APP_STORE_APPLE_ID" 2>/dev/null || true)"
          fi
          if [ -z "${LATEST}" ] || ! [[ "${LATEST}" =~ ^[0-9]+$ ]]; then
            LATEST=0
          fi
          CANDIDATE=$((LATEST + 1))
          FLOOR="${IOS_BUILD_NUMBER_FLOOR}"
          if [ "${CANDIDATE}" -lt "${FLOOR}" ]; then
            BUILD_NUMBER="${FLOOR}"
          else
            BUILD_NUMBER="${CANDIDATE}"
          fi
          echo "Resolved BUILD_NUMBER=${BUILD_NUMBER} (latest=${LATEST}, floor=${FLOOR})"
          echo "BUILD_NUMBER=${BUILD_NUMBER}" >> "$CM_ENV"
      - name: Build signed IPA (production API)
        script: |
          set -euo pipefail
          flutter build ipa --release \
            --build-number="$BUILD_NUMBER" \
            --dart-define=APP_ENV=production \
            --dart-define=API_BASE_URL=https://app.mkgtaxconsultants.com/api/v1 \
            --export-options-plist=/Users/builder/export_options.plist
      - name: Inspect IPA (bundle ID + distribution profile)
        script: |
          set -euo pipefail
          IPA="$(find build/ios/ipa -name '*.ipa' | head -n 1)"
          test -n "${IPA}"
          shasum -a 256 "${IPA}" | tee /tmp/ipa.sha256
          mkdir -p /tmp/ipa_inspect
          unzip -q -o "${IPA}" -d /tmp/ipa_inspect
          APP="$(find /tmp/ipa_inspect/Payload -maxdepth 1 -name '*.app' -type d | head -n 1)"
          PLIST="${APP}/Info.plist"
          BID="$(/usr/libexec/PlistBuddy -c 'Print :CFBundleIdentifier' "${PLIST}")"
          test "${BID}" = "${BUNDLE_ID}"
          codesign -dvvv "${APP}" 2>&1 | tee /tmp/codesign.txt | grep -E 'Authority=|TeamIdentifier=|Identifier=' || true
          grep -q 'Authority=Apple Distribution' /tmp/codesign.txt
          if grep -qE 'Authority=Apple Development|Authority=iPhone Developer' /tmp/codesign.txt; then
            echo "Development signing identity is not allowed" >&2
            exit 1
          fi
          echo "IPA inspection passed — publishing to TestFlight only."
    artifacts:
      - build/ios/ipa/*.ipa
      - /tmp/xcodebuild_logs/*.log
      - /tmp/ipa.sha256
      - /tmp/codesign.txt
    publishing:
      app_store_connect:
        auth: integration
        # Upload + submit to TestFlight. Never App Store review/release.
        submit_to_testflight: true
        submit_to_app_store: false
