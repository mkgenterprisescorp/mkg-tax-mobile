name: Staging APK Build

# Manual trigger only. This workflow does not run on push/PR to avoid
# building on every commit. Re-evaluate automatic triggers later, with
# separate owner approval, once the staging flow is stable.
on:
  workflow_dispatch: {}

env:
  # Pin the exact Flutter version used for local development so CI builds
  # are reproducible. Update this in lockstep with docs/toolchain-versions.md.
  FLUTTER_VERSION: "3.44.6"

jobs:
  build-staging-apk:
    name: Build staging APK
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: "temurin"
          java-version: "17"

      - name: Set up Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: ${{ env.FLUTTER_VERSION }}
          channel: "stable"

      - name: flutter pub get
        run: flutter pub get

      - name: flutter analyze
        run: flutter analyze

      - name: flutter test
        run: flutter test

      - name: Build staging APK
        # No secrets are used here. API_BASE_URL/LARAVEL_API_BASE_URL are
        # public staging endpoints, not credentials. Production signing is
        # intentionally not configured in this workflow.
        run: |
          flutter build apk --release \
            --build-name=1.0.0 \
            --build-number=11 \
            --dart-define=API_BASE_URL=https://app.mkgtaxconsultants.com/api/v1 \
            --dart-define=LARAVEL_API_BASE_URL=https://app.mkgtaxconsultants.com

      - name: Generate checksum
        run: |
          cd build/app/outputs/flutter-apk
          sha256sum app-release.apk > SHA256SUMS.txt
          cat SHA256SUMS.txt

      - name: Upload APK and checksum (private artifact)
        uses: actions/upload-artifact@v4
        with:
          name: mkg-tax-mobile-staging-apk
          path: |
            build/app/outputs/flutter-apk/app-release.apk
            build/app/outputs/flutter-apk/SHA256SUMS.txt
          retention-days: 14
          if-no-files-found: error
