server {
    # App Platform http_port is 8080; bind all interfaces (not localhost-only).
    listen 0.0.0.0:8080;
    server_name _;
    root /usr/share/nginx/html;
    index index.html;

    # Flutter SPA / go_router deep links
    location / {
        try_files $uri $uri/ /index.html;
    }

    location = /index.html {
        add_header Cache-Control "no-store";
    }

    location /assets/ {
        expires 7d;
        add_header Cache-Control "public";
    }

    location /health {
        access_log off;
        return 200 'ok';
        add_header Content-Type text/plain;
    }
}
