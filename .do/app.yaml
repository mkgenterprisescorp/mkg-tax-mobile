# DigitalOcean App Platform — Flutter web companion (staging).
# Existing app: mkg-tax-mobile-web (do not create a second app/droplet).
# Exactly one service. No database, worker, job, function, or custom domain.
# Do not attach to, rename, or promote financemkgtax-app or mkg-tax-backend-2-staging.
# Secret-free: public dart-defines are baked in the Dockerfile build.
#
# IMPORTANT: App Platform deploys the GitHub branch configured below.
# Production/staging releases must deploy a reviewed main merge commit
# (RELEASE_COMMIT), never a feature-branch head and never PR #71.
name: mkg-tax-mobile-web
region: sfo
services:
  - name: mkg-tax-mobile
    github:
      repo: mkgenterprisescorp/mkg-tax-mobile
      branch: main
      deploy_on_push: false
    source_dir: /
    dockerfile_path: Dockerfile
    http_port: 8080
    instance_size_slug: apps-s-1vcpu-1gb
    instance_count: 2
    health_check:
      http_path: /health
      initial_delay_seconds: 15
      period_seconds: 10
      timeout_seconds: 5
      failure_threshold: 6
