# DigitalOcean App Platform — Flutter web companion (staging).
# Exactly one service. No database, worker, job, function, or custom domain.
# Do not attach to financemkgtax-app or mkg-tax-backend-2-staging.
# Secret-free: public dart-defines are baked in the Dockerfile build.
#
# IMPORTANT: App Platform deploys the GitHub branch configured below.
# This branch must contain the complete Flutter application (not an empty skeleton).
name: mkg-tax-mobile-web
region: sfo
services:
  - name: web
    github:
      repo: mkgenterprisescorp/mkg-tax-mobile
      branch: cursor/flutter-web-app-platform-f489
      deploy_on_push: false
    dockerfile_path: Dockerfile
    http_port: 8080
    instance_size_slug: apps-s-1vcpu-0.5gb
    instance_count: 1
    health_check:
      http_path: /health
      initial_delay_seconds: 15
      period_seconds: 10
      timeout_seconds: 5
      failure_threshold: 6
